name: Sync models.dev api.json

on:
  schedule:
    - cron: "17 2 * * *" # 每天 UTC 02:17（北京时间 10:17）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch upstream api.json
        run: curl -fsSL https://models.dev/api.json -o api.json

      - name: Keep models.json in sync
        run: cp api.json models.json

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- api.json models.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api.json models.json
          git commit -m "chore(models): sync from models.dev"
          git push
