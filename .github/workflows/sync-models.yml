name: Sync upstream models.dev catalog

on:
  schedule:
    - cron: "17 2 * * *" # daily at UTC 02:17 (Asia/Shanghai 10:17)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Keep upstream snapshot for reference only.
      # Do NOT overwrite custom api.json/models.json used by FlyCode clients.
      - name: Fetch upstream api.json
        run: curl -fsSL https://models.dev/api.json -o upstream-api.json

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- upstream-api.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upstream-api.json
          git commit -m "chore(models): sync upstream-api snapshot"
          git push
